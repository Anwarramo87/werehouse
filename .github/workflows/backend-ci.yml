name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'backend-nest/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend-nest/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: backend-nest

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: warehouse_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d warehouse_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warehouse_test?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warehouse_shadow?schema=public
      JWT_SECRET: warehouse_ci_jwt_secret_very_secure
      JWT_EXPIRE: 24h
      ADMIN_BOOTSTRAP_PASSWORD: password123
      QUEUES_ENABLED: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend-nest/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Prepare shadow database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c "SELECT 1 FROM pg_database WHERE datname = 'warehouse_shadow'" | grep -q 1 \
            || PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c "CREATE DATABASE warehouse_shadow;"

      - name: Check migration history matches schema
        run: |
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Verify database migration status
        run: npx prisma migrate status

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

services:
  redis:
    image: redis:7-alpine
    container_name: warehouse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  postgres:
    image: postgres:16-alpine
    container_name: warehouse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-warehouse_systemfinly}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d warehouse_systemfinly"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: warehouse_api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-warehouse_systemfinly}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_EXPIRE: 15m
      JWT_COOKIE_MAX_AGE_MS: 900000
      JWT_ALLOW_BEARER: "false"
      AUTH_RETURN_TOKEN_IN_BODY: "false"
      REGISTRATION_ENABLED: "false"
      CSRF_PROTECTION_ENABLED: "true"
      BCRYPT_ROUNDS: 12
      QUEUES_ENABLED: "true"
    ports:
      - "5001:5001"
    command: sh -c "npx prisma migrate deploy && node dist/main"

volumes:
  postgres_data:

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Secret scanning — runs first, fails fast before any code executes
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for gitleaks --log-opts

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for organisations on the paid plan.
          # For public/personal repos the free tier is sufficient.

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Lint + typecheck + unit tests + dependency audit + build
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Dependency audit
        run: npm run audit:deps

      - name: Build
        run: npm run build
        env:
          # Prisma generate needs a valid DATABASE_URL at build time
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warehouse_ci

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: E2E tests — spins up a real Postgres service container
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: warehouse_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warehouse_ci

      - name: Run Prisma migrations
        run: npm run migrate:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warehouse_ci

      - name: E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warehouse_ci
          JWT_SECRET: ci_test_jwt_secret_min_32_chars_long
          JWT_EXPIRE: 24h
          JWT_COOKIE_NAME: warehouse_access_token
          ADMIN_BOOTSTRAP_PASSWORD: ci_admin_password_123
          DEV_ADMIN_PASSWORD: ci_dev_password_123
          SUPERADMIN_PASSWORD: ci_superadmin_password_123
          THROTTLE_TTL_MS: 60000
          THROTTLE_LIMIT: 200
          CACHE_ENABLED: false
          QUEUES_ENABLED: false
          REDIS_URL: redis://127.0.0.1:6379
          CORS_ORIGIN: http://localhost:3000
          DEVICE_AUTH_ENFORCED: false
